name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - Dev
    paths:
      - "pedu-fe/**"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build:
    name: Build PEDU debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pedu-fe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pedu-fe/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
          yes | sdkmanager --licenses

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: pedu-fe/android
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --warning-mode all 2>&1 | tee gradle-build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pedu-debug-apk
          path: pedu-fe/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pedu-gradle-build-log
          path: pedu-fe/android/gradle-build.log
